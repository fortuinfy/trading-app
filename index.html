<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StratScan AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <h1>StratScan AI</h1>
    <p>Rule-Based Stock Trading Assistant</p>
  </header>

  <main class="container">

    <!-- INPUT CARD -->

    <div class="card">

      <h2>Stock Inputs</h2>

      <div class="grid">

        <div class="input-group">
          <label>Mode</label>
          <select id="mode" onchange="toggleModeFields()">
            <option value="new">New Scan</option>
            <option value="watchlist">Watchlist Follow-Up</option>
            <option value="active">Active Trade Follow-Up</option>
          </select>
        </div>

        <div class="input-group">
          <label>Stock Name</label>
          <input type="text" id="stockName" placeholder="Enter Stock Name">
        </div>

        <div class="input-group">
          <label>Timeframe</label>
          <select id="timeframe">
            <option>Daily</option>
            <option>15 Min</option>
          </select>
        </div>

        <div class="input-group">
          <label>LTP</label>
          <input type="number" id="ltp">
        </div>

        <div class="input-group">
          <label>EMA 20</label>
          <input type="number" id="ema20">
        </div>

        <div class="input-group">
          <label>EMA 50</label>
          <input type="number" id="ema50">
        </div>

        <div class="input-group">
          <label>RSI</label>
          <input type="number" id="rsi">
        </div>

      </div>

      <!-- WATCHLIST -->

      <div id="watchlistFields" class="hidden extra-section">

        <h2>Watchlist Follow-Up</h2>

        <div class="grid">

          <div class="input-group">
            <label>Previous Entry High</label>
            <input type="number" id="prevEntryHigh">
          </div>

          <div class="input-group">
            <label>Previous Stop Loss</label>
            <input type="number" id="prevSL">
          </div>

        </div>

      </div>

      <!-- ACTIVE TRADE -->

      <div id="activeFields" class="hidden extra-section">

        <h2>Active Trade Follow-Up</h2>

        <div class="grid">

          <div class="input-group">
            <label>Executed Entry</label>
            <input type="number" id="executedEntry">
          </div>

          <div class="input-group">
            <label>Current Target</label>
            <input type="number" id="currentTarget">
          </div>

          <div class="input-group">
            <label>Current Stop Loss</label>
            <input type="number" id="currentSL">
          </div>

          <div class="input-group">
            <label>Stock Quantity Traded</label>
            <input type="number" id="stockQty">
          </div>

        </div>

      </div>

      <button class="analyze-btn" onclick="analyzeStock()">
        Analyze
      </button>

    </div>

    <!-- RESULT -->

    <div id="resultCard" class="card hidden">

      <h2>Analysis Result</h2>

      <div id="resultContent"></div>

    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
